environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  get_it: ^9.2.0
  fpdart: ^1.2.0
  go_router: ^17.1.0
  google_fonts: ^8.0.1
  cupertino_icons: ^1.0.8

  provider: ^6.1.5+1
